<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析标书 - 招投标信息展示系统</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --warning-gradient: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --danger-gradient: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            --convert-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --info-gradient: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);

            --primary-color: #667eea;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;

            --shadow-md: 0 3px 4px -1px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 6px 10px -2px rgba(0, 0, 0, 0.08);
            --shadow-xl: 0 12px 18px -4px rgba(0, 0, 0, 0.08);

            --radius-lg: 16px;
            --radius-md: 12px;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            color: var(--text-primary);
        }

        /* 头部样式 */
        .header-container {
            width: 100%;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.95) 0%, rgba(118, 75, 162, 0.95) 100%);
            color: white;
            padding: 1.5rem 0;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-xl);
            backdrop-filter: blur(10px);
        }

        .back-btn {
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: var(--radius-md);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            color: white;
            transform: translateY(-2px);
        }

        /* 统计卡片 */
        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.3s ease;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary-gradient);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-xl);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* 筛选栏 */
        .filter-bar {
            background: rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-lg);
            padding: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .form-control, .form-select {
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .btn-primary-gradient {
            background: var(--primary-gradient);
            border: none;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            color: white;
        }

        /* 项目卡片 */
        .project-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            overflow: hidden;
        }

        .project-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-xl);
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }

        .project-card.decision-pending::before { background: linear-gradient(to bottom, #fa8c16, #ffa940); }
        .project-card.decision-bid::before { background: linear-gradient(to bottom, #52c41a, #73d13d); }
        .project-card.decision-nobid::before { background: linear-gradient(to bottom, #ff4d4f, #cf1322); }

        .project-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
            margin-bottom: 0.5rem;
        }

        .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-right: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .meta-item i {
            color: var(--primary-color);
        }

        .decision-badge {
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid transparent;
        }

        .decision-pending { background: rgba(250, 140, 22, 0.1); color: #fa8c16; border-color: rgba(250, 140, 22, 0.2); }
        .decision-bid { background: rgba(82, 196, 26, 0.1); color: #52c41a; border-color: rgba(82, 196, 26, 0.2); }
        .decision-nobid { background: rgba(255, 77, 79, 0.1); color: #ff4d4f; border-color: rgba(255, 77, 79, 0.2); }

        .price-tag {
            font-size: 1.3rem;
            font-weight: 700;
            background: var(--danger-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-action {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .btn-edit {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-edit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .btn-convert {
            background: var(--convert-gradient);
            color: white;
        }

        .btn-convert:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(17, 153, 142, 0.4);
            color: white;
        }

        .btn-outline-custom {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn-outline-custom:hover {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.8);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(10px);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 模态框优化 */
        .modal-content {
            border: none;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }

        .modal-header {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 1.5rem;
        }

        .modal-header.bg-warning-custom {
            background: var(--warning-gradient);
        }

        .btn-close-white {
            filter: invert(1);
        }

        .code-input {
            letter-spacing: 0.5rem;
            font-size: 1.5rem;
            text-align: center;
            font-weight: bold;
            padding: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
        }

        .code-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        /* 分页样式 */
        .pagination .page-link {
            border: none;
            color: var(--text-primary);
            margin: 0 0.25rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .pagination .page-link:hover {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary-color);
            transform: translateY(-2px);
        }

        .pagination .page-item.active .page-link {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
        }

        .pagination .page-item.disabled .page-link {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 备注区域 */
        .remark-box {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.12) 0%, rgba(102, 126, 234, 0.04) 100%);
            border-top: 3px solid var(--primary-color);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #475569;
            line-height: 1.5;
            width: 100%;
        }

        /* 标书分析情况区域 */
        .analysis-box {
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.12) 0%, rgba(79, 172, 254, 0.04) 100%);
            border-top: 3px solid #4facfe;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #475569;
            line-height: 1.5;
            max-height: 60px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            width: 100%;
            text-align: left !important;
            display: flex !important;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .analysis-box .analysis-label {
            font-weight: 600;
            color: #1e40af;
            font-size: 0.85rem;
            white-space: nowrap;
            margin-right: 0.5rem;
            flex-shrink: 0;
        }

        /* 滚动条美化 */
        .analysis-box::-webkit-scrollbar {
            width: 6px;
        }

        .analysis-box::-webkit-scrollbar-track {
            background: rgba(79, 172, 254, 0.05);
            border-radius: 3px;
        }

        .analysis-box::-webkit-scrollbar-thumb {
            background: rgba(79, 172, 254, 0.3);
            border-radius: 3px;
        }

        .analysis-box::-webkit-scrollbar-thumb:hover {
            background: rgba(79, 172, 254, 0.5);
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .stat-value { font-size: 1.5rem; }
            .btn-action { width: 100%; margin-right: 0; justify-content: center; }
            .meta-item { display: block; margin-bottom: 0.5rem; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- 头部 -->
    <div class="header-container">
        <div class="container">
            <div class="row align-items-start">
                <div class="col-md-6">
                    <h1 class="h3 fw-bold mb-0">
                        <i class="fas fa-chart-pie me-2"></i>分析标书
                    </h1>
                    <p class="mb-0 mt-2 opacity-75">深度分析投标项目，辅助决策</p>
                </div>
                <div class="col-md-6 text-md-end mt-3 mt-md-0">
                    <a href="{{ url_for('bidding.index') }}" class="back-btn me-2 mb-2">
                        <i class="fas fa-file-signature"></i> 投标项目
                    </a>
                    <a href="{{ url_for('main.index') }}" class="back-btn">
                        <i class="fas fa-arrow-left"></i> 返回首页
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- 统计卡片 -->
        <div class="row mb-4">
            <div class="col-md-3 mb-3">
                <div class="stat-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="stat-value" id="stat-total">0</div>
                            <div class="stat-label">总项目数</div>
                        </div>
                        <div class="stat-icon">
                            <i class="fas fa-layer-group"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="stat-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="stat-value text-warning" id="stat-pending">0</div>
                            <div class="stat-label">待分析</div>
                        </div>
                        <div class="stat-icon" style="background: var(--warning-gradient);">
                            <i class="fas fa-clock"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="stat-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="stat-value text-success" id="stat-bid">0</div>
                            <div class="stat-label">决定投标</div>
                        </div>
                        <div class="stat-icon" style="background: var(--success-gradient);">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="stat-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="stat-value text-danger" id="stat-nobid">0</div>
                            <div class="stat-label">决定不投</div>
                        </div>
                        <div class="stat-icon" style="background: var(--danger-gradient);">
                            <i class="fas fa-times-circle"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="filter-bar">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label">决定筛选</label>
                    <select class="form-select" id="decision-filter" onchange="loadData(1)">
                        <option value="all">全部决定</option>
                        <option value="pending">待定</option>
                        <option value="bid">投标</option>
                        <option value="nobid">不投</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">关键词搜索</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="search-input" placeholder="搜索项目名称..." onkeyup="debounceSearch()">
                        <button class="btn btn-outline-secondary" onclick="clearSearch()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary-gradient w-100" onclick="loadData(1)">
                        <i class="fas fa-search me-2"></i>查询
                    </button>
                </div>
            </div>
        </div>

        <!-- 数据列表 -->
        <div id="project-list"></div>

        <!-- 分页 -->
        <div class="d-flex justify-content-center mt-4" id="pagination-container" style="display: none !important;">
            <nav aria-label="Page navigation">
                <ul class="pagination" id="pagination"></ul>
            </nav>
        </div>
    </div>

    <!-- 口令验证模态框 -->
    <div class="modal fade" id="codeModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-lock me-2"></i>安全验证</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center p-4">
                    <div class="mb-4">
                        <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-light" style="width: 80px; height: 80px;">
                            <i class="fas fa-shield-alt fa-2x text-primary"></i>
                        </div>
                    </div>
                    <p class="text-muted mb-3" id="code-hint">请输入访问口令以编辑此记录</p>
                    <input type="password" class="form-control code-input mb-3" id="access-code" placeholder="••••••" maxlength="20">
                    <div id="code-error" class="text-danger small" style="display:none;">
                        <i class="fas fa-exclamation-circle me-1"></i>口令错误，请重试
                    </div>
                </div>
                <div class="modal-footer border-0 justify-content-center pb-4">
                    <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary-gradient px-4" onclick="verifyCode()">验证</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-edit me-2"></i>编辑分析信息</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="hidden" id="edit-id">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">开标日期</label>
                            <input type="date" class="form-control" id="edit-bid-open-date">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">招标人</label>
                            <input type="text" class="form-control" id="edit-tenderer" placeholder="输入招标单位名称">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">招标控制价（万元）</label>
                            <div class="input-group">
                                <span class="input-group-text">¥</span>
                                <input type="number" step="0.01" class="form-control" id="edit-control-price" placeholder="0.00">
                                <span class="input-group-text">万</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">分析决定</label>
                            <select class="form-select" id="edit-decision" onchange="toggleReasonField()">
                                <option value="pending">🟡 待定</option>
                                <option value="bid">🟢 投标</option>
                                <option value="nobid">🔴 不投</option>
                            </select>
                        </div>
                        <div class="col-12" id="reason-field" style="display:none;">
                            <label class="form-label fw-bold">不投原因 / 备注</label>
                            <textarea class="form-control" id="edit-decision-reason" rows="3" placeholder="请输入不投标的具体原因或其他备注..."></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">标书分析情况</label>
                            <textarea class="form-control" id="edit-analysis-content" rows="4" placeholder="请输入标书分析详情，如评分标准、资质要求、技术参数、商务条款、竞争对手分析等..."></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">操作人</label>
                            <input type="text" class="form-control" id="edit-operator" placeholder="您的姓名">
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary-gradient" onclick="saveEdit()">
                        <i class="fas fa-save me-2"></i>保存修改
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 隐藏字段 -->
    <input type="hidden" id="current-action" value="">
    <input type="hidden" id="convert-id" value="">

    <script src="{{ url_for('static', filename='js/jquery-3.6.0.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>

    <script>
        const API_BASE = "{{ url_for('analysis.api_list') }}".replace('/list', '');
        const BIDDING_API_BASE = "{{ url_for('bidding.api_list') }}".replace('/list', '');
        let currentPage = 1;
        let currentEditId = null;
        let verifiedCode = null;

        $(document).ready(function() {
            loadData(1);
        });

        function debounceSearch() {
            clearTimeout(window.searchTimeout);
            window.searchTimeout = setTimeout(() => loadData(1), 500);
        }

        function clearSearch() {
            $('#search-input').val('');
            loadData(1);
        }

        function loadData(page) {
            currentPage = page;
            const decision = $('#decision-filter').val();
            const keyword = $('#search-input').val();

            $.get(`${API_BASE}/list`, {
                decision: decision,
                keyword: keyword,
                page: page,
                page_size: 10
            }, function(res) {
                if (res.success) {
                    renderList(res.data);
                    renderStats(res.statistics);
                    renderPagination(res.pagination);
                } else {
                    showToast('加载失败：' + res.message, 'error');
                }
            }).fail(function() {
                showToast('网络错误，请稍后重试', 'error');
            });
        }

        function renderStats(stats) {
            const total = (stats.pending || 0) + (stats.bid || 0) + (stats.nobid || 0);
            $('#stat-total').text(total);
            $('#stat-pending').text(stats.pending || 0);
            $('#stat-bid').text(stats.bid || 0);
            $('#stat-nobid').text(stats.nobid || 0);
        }

        function renderList(data) {
            const container = $('#project-list');
            container.empty();

            if (data.length === 0) {
                container.html(`
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h5>暂无分析项目</h5>
                        <p>从"重点关注"模块转入项目进行分析</p>
                    </div>
                `);
                return;
            }

            data.forEach(item => {
                const decisionClass = item.decision;
                const decisionText = item.decision_text;

                const priceDisplay = item.control_price ?
                    `<span class="price-tag">¥${item.control_price.toFixed(2)}万</span>` :
                    '<span class="text-muted">未填写</span>';

                let actionButtons = '';
                if (item.decision === 'bid') {
                    actionButtons += `
                        <button class="btn-action btn-convert mb-2 w-100" onclick="convertToBidding(${item.id})" title="转为投标项目">
                            <i class="fas fa-exchange-alt"></i> 转投标项目
                        </button>
                    `;
                }
                actionButtons += `
                    <button class="btn-action btn-edit w-100" onclick="openEdit(${item.id})">
                        <i class="fas fa-edit"></i> 编辑分析
                    </button>
                `;

                const html = `
                    <div class="project-card decision-${decisionClass}">
                        <div class="row align-items-start">
                            <div class="col-lg-8 mb-3 mb-lg-0">
                                <div class="project-title">${item.project_name}</div>
                                <div class="mb-2 mt-2">
                                    <div class="meta-item">
                                        <i class="fas fa-building"></i>
                                        <span>${item.project_source}</span>
                                    </div>
                                    <div class="meta-item">
                                        <i class="fas fa-calendar"></i>
                                        <span>发布: ${item.publish_date}</span>
                                    </div>
                                    <div class="meta-item">
                                        <i class="fas fa-gavel"></i>
                                        <span>开标: ${item.bid_open_date || '待定'}</span>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center flex-wrap gap-2">
                                    <span class="decision-badge decision-${decisionClass}">${decisionText}</span>
                                    ${item.tenderer ? `<span class="badge bg-light text-dark border"><i class="fas fa-user me-1"></i>${item.tenderer}</span>` : ''}
                                    ${item.operator ? `<span class="badge bg-light text-dark border"><i class="fas fa-user-edit me-1"></i>${item.operator}</span>` : ''}
                                </div>
                                ${item.decision_reason ? `
                                    <div class="remark-box">
                                        <i class="fas fa-comment-alt me-1 text-primary"></i>
                                        ${item.decision_reason}
                                    </div>
                                ` : ''}
                                ${item.analysis_content ? `
                                    <div class="analysis-box">
                                        <span class="analysis-label">标书分析情况：</span>${item.analysis_content}
                                    </div>
                                ` : ''}
                            </div>
                            <div class="col-lg-2 text-center mb-3 mb-lg-0">
                                <div class="mb-2 text-muted small fw-bold">招标控制价</div>
                                <div class="mb-2">${priceDisplay}</div>
                                ${item.operator ? `<div class="small text-muted"><i class="fas fa-user-edit me-1"></i>操作人: ${item.operator}</div>` : ''}
                            </div>
                            <div class="col-lg-2 ps-lg-3">
                                ${item.detail_url ? `
                                    <a href="${item.detail_url}" target="_blank" class="btn-action btn-outline-custom w-100 mb-2 justify-content-center">
                                        <i class="fas fa-external-link-alt"></i> 查看原文
                                    </a>
                                ` : ''}
                                ${actionButtons}
                            </div>
                        </div>
                    </div>
                `;
                container.append(html);
            });
        }

        function renderPagination(pg) {
            const container = $('#pagination');
            const navContainer = $('#pagination-container');

            if (pg.total_pages <= 1) {
                navContainer.hide();
                return;
            }

            navContainer.show();
            navContainer.css('display', 'flex');
            container.empty();

            container.append(`
                <li class="page-item ${pg.page === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="return changePage(${pg.page - 1})">上一页</a>
                </li>
            `);

            for (let i = 1; i <= pg.total_pages; i++) {
                if (i === 1 || i === pg.total_pages || (i >= pg.page - 2 && i <= pg.page + 2)) {
                    container.append(`
                        <li class="page-item ${i === pg.page ? 'active' : ''}">
                            <a class="page-link" href="#" onclick="return changePage(${i})">${i}</a>
                        </li>
                    `);
                } else if (i === pg.page - 3 || i === pg.page + 3) {
                    container.append('<li class="page-item disabled"><span class="page-link">...</span></li>');
                }
            }

            container.append(`
                <li class="page-item ${pg.page === pg.total_pages ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="return changePage(${pg.page + 1})">下一页</a>
                </li>
            `);
        }

        function changePage(page) {
            if (page >= 1 && page !== currentPage) {
                loadData(page);
                $('html, body').animate({ scrollTop: 0 }, 300);
            }
            return false;
        }

        function openEdit(id) {
            currentEditId = id;
            $('#current-action').val('edit');
            $('#convert-id').val('');

            if (verifiedCode && window.lastVerifyTime && (Date.now() - window.lastVerifyTime < 300000)) {
                loadDetailAndShow();
                return;
            }

            $('#code-hint').text('请输入访问口令以编辑此记录');
            $('#access-code').val('');
            $('#code-error').hide();
            $('#codeModal').modal('show');
            setTimeout(() => $('#access-code').focus(), 500);
        }

        function convertToBidding(analysisId) {
            $('#current-action').val('convert');
            $('#convert-id').val(analysisId);

            if (verifiedCode && window.lastVerifyTime && (Date.now() - window.lastVerifyTime < 300000)) {
                doConvert(analysisId);
                return;
            }

            $('#code-hint').text('请输入访问口令以将该项目转为投标项目');
            $('#access-code').val('');
            $('#code-error').hide();
            $('#codeModal').modal('show');
            setTimeout(() => $('#access-code').focus(), 500);
        }

        function doConvert(analysisId) {
            const btn = event.target.closest('button');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>处理中...';
            btn.disabled = true;

            $.ajax({
                url: `${BIDDING_API_BASE}/convert/${analysisId}`,
                method: 'POST',
                headers: { 'X-Access-Code': verifiedCode },
                success: function(res) {
                    if (res.success) {
                        showToast('已成功转为投标项目，即将跳转...', 'success');
                        setTimeout(() => {
                            window.location.href = "{{ url_for('bidding.index') }}";
                        }, 1500);
                    } else {
                        showToast(res.message || '转换失败', 'error');
                        btn.innerHTML = originalHtml;
                        btn.disabled = false;
                    }
                },
                error: function(xhr) {
                    if (xhr.status === 403) {
                        showToast('口令错误', 'error');
                        verifiedCode = null;
                    } else if (xhr.status === 400) {
                        showToast('该项目已存在投标记录，请勿重复转换', 'warning');
                    } else {
                        showToast('转换失败，请重试', 'error');
                    }
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                }
            });
        }

        function verifyCode() {
            const code = $('#access-code').val().trim();
            const action = $('#current-action').val();
            const convertId = $('#convert-id').val();

            if (!code) {
                $('#code-error').show();
                return;
            }

            $.ajax({
                url: `${API_BASE}/verify`,
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ access_code: code }),
                success: function(res) {
                    if (res.success) {
                        verifiedCode = code;
                        window.lastVerifyTime = Date.now();
                        $('#codeModal').modal('hide');
                        $('#access-code').val('');

                        if (action === 'convert' && convertId) {
                            doConvert(convertId);
                        } else {
                            loadDetailAndShow();
                        }
                    } else {
                        $('#code-error').show();
                        $('#access-code').select();
                    }
                },
                error: function() {
                    $('#code-error').text('验证失败，请重试').show();
                }
            });
        }

        // 回车键提交验证
        $('#access-code').on('keypress', function(e) {
            if (e.which === 13) {
                verifyCode();
            }
        });

        function loadDetailAndShow() {
            $.ajax({
                url: `${API_BASE}/detail/${currentEditId}`,
                headers: { 'X-Access-Code': verifiedCode },
                success: function(res) {
                    if (res.success) {
                        const d = res.data;
                        $('#edit-id').val(d.id);
                        $('#edit-bid-open-date').val(d.bid_open_date);
                        $('#edit-tenderer').val(d.tenderer);
                        $('#edit-control-price').val(d.control_price);
                        $('#edit-decision').val(d.decision);
                        $('#edit-decision-reason').val(d.decision_reason);
                        $('#edit-analysis-content').val(d.analysis_content);
                        $('#edit-operator').val(d.operator);

                        toggleReasonField();
                        $('#editModal').modal('show');
                    } else {
                        showToast(res.message || '加载失败', 'error');
                    }
                },
                error: function(xhr) {
                    if (xhr.status === 403) {
                        showToast('口令已过期，请重新验证', 'error');
                        verifiedCode = null;
                    }
                }
            });
        }

        function toggleReasonField() {
            const decision = $('#edit-decision').val();
            if (decision === 'nobid') {
                $('#reason-field').slideDown(300);
            } else {
                $('#reason-field').slideUp(300);
            }
        }

        function saveEdit() {
            const data = {
                bid_open_date: $('#edit-bid-open-date').val() || null,
                tenderer: $('#edit-tenderer').val(),
                control_price: $('#edit-control-price').val() || null,
                decision: $('#edit-decision').val(),
                decision_reason: $('#edit-decision').val() === 'nobid' ? $('#edit-decision-reason').val() : '',
                analysis_content: $('#edit-analysis-content').val(),
                operator: $('#edit-operator').val()
            };

            if (!data.operator) {
                showToast('请输入操作人姓名', 'warning');
                $('#edit-operator').focus();
                return;
            }

            $.ajax({
                url: `${API_BASE}/update/${currentEditId}`,
                method: 'PUT',
                headers: { 'X-Access-Code': verifiedCode },
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function(res) {
                    if (res.success) {
                        $('#editModal').modal('hide');
                        loadData(currentPage);
                        showToast('保存成功', 'success');
                    } else {
                        showToast(res.message || '保存失败', 'error');
                    }
                },
                error: function(xhr) {
                    if (xhr.status === 403) {
                        showToast('口令验证失败，请重新验证', 'error');
                        $('#editModal').modal('hide');
                        verifiedCode = null;
                    } else {
                        showToast('保存失败', 'error');
                    }
                }
            });
        }

        function showToast(msg, type = 'info') {
            const bgClass = type === 'success' ? 'bg-success' :
                          type === 'error' ? 'bg-danger' :
                          type === 'warning' ? 'bg-warning text-dark' : 'bg-primary';
            const icon = type === 'success' ? 'fa-check-circle' :
                        type === 'error' ? 'fa-exclamation-circle' :
                        type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle';

            const toast = $(`
                <div class="toast align-items-center ${bgClass} text-white border-0 position-fixed"
                     style="top: 20px; right: 20px; z-index: 9999; min-width: 300px;" role="alert">
                    <div class="d-flex">
                        <div class="toast-body">
                            <i class="fas ${icon} me-2"></i>${msg}
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                    </div>
                </div>
            `);

            $('body').append(toast);
            const toastEl = $('.toast').last();
            const bsToast = new bootstrap.Toast(toastEl, { delay: 3000 });
            bsToast.show();

            toastEl.on('hidden.bs.toast', function() {
                $(this).remove();
            });
        }
    </script>
</body>
</html>
